name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Geliştirme araçlarını kur
        run: python -m pip install --upgrade pip ruff mypy

      - name: Lint (ruff)
        run: ruff check .

      - name: Testler (unittest)
        # Rapor motorları saf/headless — GUI (PyQt) bağımlılığı olmadan çalışır
        # (PyQt6/reportlab gerektiren smoke testleri otomatik atlanır).
        run: python -m unittest discover -p 'test_*.py' -v

      - name: Tip kontrolü (mypy — bilgi amaçlı)
        continue-on-error: true
        run: mypy .

  smoke:
    # PDF üretimi + PyQt6 görünümleri (offscreen) — GUI regresyonlarını yakalar.
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Qt sistem kütüphaneleri
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Bağımlılıkları kur
        run: python -m pip install --upgrade pip PyQt6 matplotlib reportlab

      - name: Smoke testleri (PDF + UI offscreen)
        run: python -m unittest test_pdf_smoke test_ui_smoke -v
